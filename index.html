<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Hanna Portfolio</title>

<style>
body {
  margin: 0;
  background: #fff;
  font-family: sans-serif;
}

/* ===== GRID ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 1200px;
  margin: 100px auto;
  padding: 0 20px;
}

/* ===== IMAGE ===== */
.gallery img {
  width: 100%;
  cursor: pointer;
  opacity: 0;
  transform: translateY(50px);
  transition: all 0.8s ease;
}

/* 등장 애니메이션 */
.gallery img.show {
  opacity: 1;
  transform: translateY(0);
}

/* ===== MODAL ===== */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
}

/* 확대 이미지 */
.modal img {
  max-width: 80%;
  max-height: 80%;
  transform: scale(0.8);
  transition: 0.4s;
}

.modal.active img {
  transform: scale(1);
}

/* 닫기 버튼 */
.close {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 30px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="gallery">
  <img src="1.jpg">
  <img src="2.jpg">
  <img src="3.jpg">
  <img src="4.jpg">
  <img src="5.jpg">
  <img src="6.jpg">
  <img src="7.jpg">
  <img src="8.jpg">
  <img src="9.jpg">
  <img src="10.jpg">
  <img src="11.jpg">
  <img src="12.jpg">
  <img src="13.jpg">
  <img src="14.jpg">
  <img src="15.jpg">
  <img src="16.jpg">
</div>

<!-- 모달 -->
<div class="modal" id="modal">
  <span class="close" id="close">&times;</span>
  <img id="modalImg">
</div>

<script>
/* ===== 등장 애니메이션 ===== */
const images = document.querySelectorAll('.gallery img');

window.addEventListener('load', () => {
  images.forEach((img, i) => {
    setTimeout(() => {
      img.classList.add('show');
    }, i * 100); // 순차적으로 올라옴
  });
});

/* ===== 모달 기능 ===== */
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const close = document.getElementById('close');

images.forEach(img => {
  img.addEventListener('click', () => {
    modal.classList.add('active');
    modalImg.src = img.src;
  });
});

close.addEventListener('click', () => {
  modal.classList.remove('active');
});

/* 배경 클릭시 닫기 */
modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    modal.classList.remove('active');
  }
});
</script>

</body>
</html>
