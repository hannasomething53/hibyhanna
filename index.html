<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Hanna Visual Portfolio</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* ===== 랜덤 배치 영역 ===== */
.stage {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* ===== 이미지 ===== */
.thumb {
  position: absolute;
  cursor: pointer;
  transition: transform 1.5s ease, opacity 1s;
}

/* ===== 확대 모드 ===== */
.thumb.active {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(2);
  z-index: 10;
}

/* ===== 배경 ===== */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  opacity: 0;
  pointer-events: none;
  transition: 1s;
}

.overlay.show {
  opacity: 1;
  pointer-events: all;
}
</style>
</head>

<body>

<div class="stage" id="stage"></div>
<div class="overlay" id="overlay"></div>

<script>
const stage = document.getElementById("stage");
const overlay = document.getElementById("overlay");

let activeImg = null;

/* ===== 이미지 생성 ===== */
for (let i = 1; i <= 16; i++) {

  let img = document.createElement("img");
  img.src = "images/" + i + ".jpg";
  img.className = "thumb";

  /* 랜덤 크기 */
  let size = Math.random() * 200 + 200; // 200~400
  img.style.width = size + "px";

  /* 랜덤 위치 */
  img.style.left = Math.random() * 90 + "%";
  img.style.top = Math.random() * 90 + "%";

  /* 랜덤 회전 */
  let rotate = Math.random() * 40 - 20;
  img.style.transform = "rotate(" + rotate + "deg)";

  /* 클릭 이벤트 */
  img.addEventListener("click", () => {

    if (activeImg) return;

    activeImg = img;

    overlay.classList.add("show");

    setTimeout(() => {
      img.classList.add("active");
      img.style.transform = "translate(-50%, -50%) scale(1.8)";
    }, 50);
  });

  stage.appendChild(img);
}

/* ===== 닫기 ===== */
overlay.addEventListener("click", () => {

  if (!activeImg) return;

  activeImg.classList.remove("active");

  /* 원래 상태로 복귀 */
  let rotate = Math.random() * 40 - 20;
  activeImg.style.transform = "rotate(" + rotate + "deg)";

  overlay.classList.remove("show");

  setTimeout(() => {
    activeImg = null;
  }, 800);
});
</script>

</body>
</html>
